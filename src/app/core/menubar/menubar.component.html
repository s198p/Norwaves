<header class="site-header">
  <div class="site-container nav-shell">
    <a routerLink="/" class="brand" (click)="closeMenu()">
      <img src="assets/Norwaves.png" alt="Norwaves Logo" class="logo" />
    </a>

    <button
      class="menu-toggle"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen"
      aria-label="Toggle navigation"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="nav-links" [class.open]="menuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Home</a>
      <a routerLink="/who-we-are" routerLinkActive="active" (click)="closeMenu()">Who We Are</a>
      <a routerLink="/industries" routerLinkActive="active" (click)="closeMenu()">Industries</a>
      <a routerLink="/contact-us" routerLinkActive="active" (click)="closeMenu()">Contact Us</a>
      <a routerLink="/contact-us" class="cta-link" (click)="closeMenu()">Book A Consultation</a>
    </nav>
  </div>
</header>
